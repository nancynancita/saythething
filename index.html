<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say The Thing</title>
    <style>
        :root {
            --bg-color: #FAFAFA;
            --text-color: #0A3054;
            --primary-color: #1B446D;
            --accent-pink: #F3D2C1;
            --accent-red: #D96B62;
            --accent-yellow: #F6E2BC;
            --border-color: #0A3054;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: transparent;
        }

        h1 {
            font-family: Georgia, serif;
            font-size: 2.5rem;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        hr {
            border: none;
            border-top: 1px solid var(--accent-pink);
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--accent-yellow);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .pink-card {
            background-color: var(--accent-pink);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .alert-card {
            background-color: #FFF0F0;
            border: 1px solid var(--accent-red);
            color: #5C1D19;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .progress-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #E0E0E0;
        }

        .dot.active {
            background-color: var(--primary-color);
        }

        .question-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .question-text {
            font-family: Georgia, serif;
            font-size: 1.5rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .question-subtext {
            font-size: 1rem;
            color: #4A607A;
            margin-bottom: 20px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-button {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #FFFFFF;
            color: var(--text-color);
            font-size: 1rem;
            text-align: left;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .option-button:hover {
            background-color: #F0F4F8;
        }

        .option-button.selected {
            background-color: var(--primary-color);
            color: #FFFFFF;
            border-color: var(--primary-color);
        }

        textarea {
            width: 100%;
            height: 140px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            background: #FFFFFF;
            color: var(--text-color);
            resize: none;
            outline: none;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 24px;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #FFFFFF;
            border: none;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .hidden {
            display: none !important;
        }

        .result-section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 12px;
        }

        .register-box {
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .register-title {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: var(--primary-color);
        }

        .bullet-list {
            list-style-type: none;
        }

        .bullet-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            line-height: 1.5;
        }
